name: guess_the_dots
description: "Guess the Dots — daily color-code puzzle"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # Fonts (Fraunces, Plus Jakarta Sans, JetBrains Mono — bundled via google_fonts)
  google_fonts: ^8.0.2

  # Animations
  flutter_animate: ^4.5.2

  # Persistence
  shared_preferences: ^2.5.5

  # Firebase
  firebase_core: ^4.3.1
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.1.1
  google_sign_in: ^7.2.0
  sign_in_with_apple: ^7.0.1

  # Ads + IAP
  google_mobile_ads: ^8.0.0
  in_app_purchase: ^3.2.3

  # Utilities
  share_plus: ^13.1.0
  url_launcher: ^6.3.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.6.0
  freezed: ^3.2.5
  json_serializable: ^6.10.0

flutter:
  uses-material-design: true
